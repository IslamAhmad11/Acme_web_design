name: CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  DOCKER_IMAGE: islamahmad9/acme-web-design
  GKE_PROJECT: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: acme-web-cluster
  GKE_ZONE: us-central1-c

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

  deploy-to-gke:
    needs: security-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/533499523141/locations/global/workloadIdentityPools/github-final-pool/providers/github-final-provider
          service_account: terraform-local@project-0504e4c0-5823-4296-881.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GKE_PROJECT }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/network-policy.yaml
          kubectl rollout status deployment/my-acme-website --timeout=180s

  health-check:
    needs: deploy-to-gke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/533499523141/locations/global/workloadIdentityPools/github-final-pool/providers/github-final-provider
          service_account: terraform-local@project-0504e4c0-5823-4296-881.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GKE_PROJECT }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Get External IP
        id: ip
        run: |
          IP=$(kubectl get svc my-acme-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "external_ip=$IP" >> $GITHUB_OUTPUT

      - name: Install Requests
        run: pip install requests

      - name: Run Health Check
        env:
          APP_URL: http://${{ steps.ip.outputs.external_ip }}
        run: python scripts/health_check.py
